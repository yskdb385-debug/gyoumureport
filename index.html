<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>発掘調査日報</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c2b39">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="調査日報">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #eceee8;
    --paper: #f6f6f2;
    --ink: #1c2b39;
    --ink-soft: #4a5a68;
    --accent: #e8b324;
    --accent-ink: #4a3a08;
    --soil: #6b4a32;
    --tarp: #2f6690;
    --line: #cfc9b8;
    --danger: #a13d2f;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    background-image: linear-gradient(var(--line) 1px, transparent 1px);
    background-size: 100% 34px;
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(90px + var(--safe-bottom));
  }
  .mincho{ font-family: 'Shippori Mincho', serif; }
  header.top{
    position: sticky; top:0; z-index: 40;
    padding: calc(14px + var(--safe-top)) 18px 14px;
    background: var(--ink); color: #f6f6f2;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 3px solid var(--accent);
  }
  header.top .eyebrow{ font-size: 11px; letter-spacing: .22em; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
  header.top h1{ font-size: 19px; margin:0; font-weight: 700; }
  .stamp{
    width: 50px; height: 50px; border-radius: 50%; border: 2.5px solid var(--accent);
    display:flex; align-items:center; justify-content:center; flex-direction: column; flex-shrink:0; color: var(--accent);
  }
  .stamp .d{ font-family:'Shippori Mincho',serif; font-size:18px; font-weight:700; line-height:1;}
  .stamp .w{ font-size:9px; letter-spacing:.1em; margin-top:2px;}
  main{ max-width: 640px; margin: 0 auto; padding: 18px 16px 8px; }
  .view{ display:none; animation: fade .25s ease; }
  .view.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .btn-primary{
    width:100%; padding:16px; border:none; border-radius: var(--radius);
    background: var(--ink); color: #fff; font-size:16px; font-weight:700;
    font-family:'Zen Kaku Gothic New',sans-serif; letter-spacing:.03em;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow: 0 3px 0 var(--soil);
  }
  .btn-primary:active{ transform: translateY(2px); box-shadow:0 1px 0 var(--soil); }
  .btn-secondary{
    width:100%; padding:14px; border-radius: var(--radius);
    background: transparent; border: 1.5px solid var(--ink); color: var(--ink);
    font-weight:700; font-size:15px; font-family:'Zen Kaku Gothic New',sans-serif;
  }
  .btn-ghost{ background:none; border:none; color: var(--tarp); font-weight:700; font-size:14px; padding:8px 4px; font-family:'Zen Kaku Gothic New',sans-serif; }
  .btn-yellow{ border:none; border-radius: var(--radius); background: var(--accent); color: var(--accent-ink); font-weight:900; font-size:14px; padding:10px 16px; }

  .section-title{ font-size: 12px; letter-spacing:.18em; color: var(--soil); font-weight:700; margin: 26px 0 10px; display:flex; align-items:center; gap:8px; }
  .section-title::after{ content:""; flex:1; height:1px; background:var(--line); }
  .section-hint{ font-size:12px; color:var(--ink-soft); margin: -4px 0 10px; }

  .card{ background: var(--paper); border-radius: var(--radius); border: 1px solid var(--line); padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(28,43,57,.05); }
  .field{ margin-bottom: 14px; }
  .field:last-child{ margin-bottom:0; }
  .field label{ display:block; font-size:11.5px; color: var(--ink-soft); font-weight:700; letter-spacing:.04em; margin-bottom:5px; }
  .field input[type=text], .field input[type=date], .field select, .field textarea{
    width:100%; padding: 11px 12px; border-radius: 9px; border: 1.5px solid var(--line); background:#fff;
    font-size:15.5px; font-family:'Zen Kaku Gothic New',sans-serif; color: var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline: 2px solid var(--tarp); outline-offset: 1px; border-color: var(--tarp); }
  .field textarea{ resize: vertical; min-height: 46px; }
  .row2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }

  .combo-row{ display:flex; gap:6px; }
  .combo-row input{ flex:1; min-width:0; }
  .combo-btn{ width:44px; flex-shrink:0; border-radius:9px; border:1.5px solid var(--line); background:#fff; font-size:15px; color:var(--ink-soft); font-weight:700; }
  .combo-row.small{ margin-bottom:6px; }
  .combo-row.small input{ font-size:14px; padding:9px 10px; }
  .combo-row.small .combo-btn{ width:38px; font-size:13px; }
  .cap-row{ margin-top:8px; }
  .caption-final{ margin-top:2px; font-size:15.5px !important; padding:11px 12px !important; }

  .keika-item{ display:flex; gap:6px; margin-bottom:8px; align-items:center; }
  .keika-item span.bullet{ color: var(--accent-ink); font-weight:900; }
  .keika-item input{ flex:1; min-width:0; font-size:15.5px; padding:11px 12px; border-radius:9px; border:1.5px solid var(--line); font-family:'Zen Kaku Gothic New',sans-serif; }
  .keika-item .combo-btn{ width:38px; flex-shrink:0; }
  .keika-item .rm-btn{ background:none; border:none; color:var(--danger); font-size:20px; padding:4px 6px; flex-shrink:0; }
  .add-line{ font-size:14px; color: var(--tarp); font-weight:700; background:none; border:none; padding:6px 2px; }

  .photo-block{ border:1.5px dashed var(--line); border-radius:12px; padding:12px; margin-bottom:12px; background:#fff; }
  .photo-block.text-block{ background:#fdfcf8; border-color:var(--soil); }
  .finding-text{ width:100%; min-height:96px; font-size:15.5px; line-height:1.6; padding:11px 12px; border-radius:8px; border:1.5px solid var(--line); resize:vertical; font-family:inherit; }
  .finding-add-row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .photo-block .rowbtns button.mv{ flex:0 0 44px; font-size:15px; }
  .photo-block img{ width:100%; border-radius:8px; display:block; max-height: 260px; object-fit:cover; }
  .photo-block input[type=text]{ margin-top:8px; }
  .photo-block .rowbtns{ display:flex; gap:8px; margin-top:8px; }
  .photo-block .rowbtns button{ flex:1; text-align:center; font-size:13px; font-weight:700; background:none; border:1.5px solid var(--line); border-radius:8px; padding:8px; color:var(--ink); }
  .photo-block .rowbtns button.rm{ color:var(--danger); border-color:var(--danger); }
  .photo-add-row{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .photo-add-btn{ padding: 20px 8px; border-radius: 12px; border: 1.5px solid var(--ink); background: #fff; text-align:center; font-size:13.5px; font-weight:700; color:var(--ink); display:flex; flex-direction:column; align-items:center; gap:6px; }
  .photo-add-btn svg{ width:26px; height:26px; }
  .sketch-add-btn{ width:100%; padding:18px 8px; border-radius: 12px; border: 1.5px dashed var(--soil); background: #fff; text-align:center; font-size:14px; font-weight:700; color:var(--soil); display:flex; flex-direction:column; align-items:center; gap:6px; }

  .entry-card{ display:flex; gap:12px; padding:14px; background:var(--paper); border:1px solid var(--line); border-radius: var(--radius); margin-bottom:10px; }
  .entry-card .stamp{ width:44px; height:44px; }
  .entry-card .stamp .d{ font-size:15px; }
  .entry-card .info{ flex:1; min-width:0; }
  .entry-card .info .weather{ font-size:12px; color:var(--tarp); font-weight:700; }
  .entry-card .info .title{ font-weight:700; font-size:15px; margin: 2px 0 4px; }
  .entry-card .info .summary{ font-size:12.5px; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .entry-card .chev{ align-self:center; color:var(--line); font-size:20px; }
  .entry-excel-btn{ align-self:center; flex-shrink:0; background:var(--tarp); color:#fff; border:none; border-radius:8px; padding:8px 10px; font-size:11.5px; font-weight:700; }
  .select-check{ width:26px; height:26px; border-radius:7px; border:2px solid var(--line); background:#fff; flex-shrink:0; align-self:center; position:relative; }
  .select-check.checked{ background:var(--tarp); border-color:var(--tarp); }
  .select-check.checked::after{ content:"✓"; color:#fff; font-size:16px; font-weight:900; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  body.select-mode{ padding-bottom: calc(200px + var(--safe-bottom)); }
  .bulk-bar{ position:fixed; left:0; right:0; bottom:calc(78px + var(--safe-bottom)); background:#fff; border-top:1px solid var(--line); box-shadow:0 -3px 14px rgba(0,0,0,.1); padding:10px 16px; z-index:60; border-radius:16px 16px 0 0; }
  .bulk-bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; justify-content:space-between; }
  .bulk-bar-row:last-child{ margin-bottom:0; }
  .bulk-bar-row .btn-secondary, .bulk-bar-row .btn-primary{ flex:1; padding:12px; font-size:14px; }

  .empty{ text-align:center; padding: 40px 20px; color: var(--ink-soft); }
  .empty .big{ font-size:15px; font-weight:700; margin-bottom:4px; color:var(--ink);}

  .fab-nav{ position: fixed; bottom:0; left:0; right:0; z-index:50; background: var(--ink); padding: 10px 16px calc(10px + var(--safe-bottom)); display:flex; gap:10px; border-top: 3px solid var(--accent); }
  .fab-nav button{ flex:1; background:none; border:none; color:#cfd6dc; font-size:11px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0; }
  .fab-nav button.active{ color: var(--accent); }
  .fab-nav svg{ width:22px; height:22px; }

  .toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .backbtn{ background:none; border:none; color:var(--ink); font-size:15px; font-weight:700; display:flex; align-items:center; gap:4px; padding:6px 2px 6px 0; }

  .toast{ position: fixed; bottom: 96px; left:50%; transform: translateX(-50%); background: var(--ink); color:#fff; padding: 10px 18px; border-radius: 999px; font-size:13.5px; font-weight:700; z-index:400; opacity:0; pointer-events:none; transition: opacity .25s, transform .25s; border:1px solid var(--accent); max-width:88vw; text-align:center; }
  .diag-panel{ position:fixed; left:12px; right:12px; bottom:12px; max-height:70vh; overflow:auto; background:var(--ink); color:#fff; border-radius:14px; padding:16px; font-size:13.5px; line-height:1.65; z-index:900; box-shadow:0 8px 30px rgba(0,0,0,.4); display:none; white-space:pre-wrap; }
  .diag-panel.active{ display:block; }
  .diag-panel button{ margin-top:14px; width:100%; padding:11px; border-radius:9px; border:none; background:var(--accent); color:var(--accent-ink); font-weight:700; font-size:14.5px; }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-4px); }

  #printSheet{ background:#fff; }
  .p-head{ text-align:center; font-family:'Shippori Mincho',serif; font-size:20px; letter-spacing:.4em; font-weight:700; padding: 8px 0; border:2px solid var(--ink); border-bottom:none; margin-bottom:0;}
  .p-table{ width:100%; border-collapse: collapse; table-layout:fixed; font-size:12.5px; }
  .p-table col.c-lbl{ width:12.5%; }
  .p-table col.c-val{ width:12.5%; }
  .p-table td, .p-table th{ border:1px solid var(--ink); padding:6px 7px; vertical-align: middle; word-break:keep-all; overflow-wrap:break-word; }
  .p-table .lbl{ background:#e9e7de; font-weight:700; text-align:center; }
  .p-table .section-lbl{ background:#e9e7de; font-weight:700; text-align:left; padding:7px 9px; }
  .p-table .keika-val{ vertical-align:top; white-space:pre-line; }
  .p-photos{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .p-photos figure{ margin:0; border:1px solid var(--ink); padding:5px; break-inside:avoid; }
  .p-photos img{ width:100%; display:block; }
  .p-photos.small img{ max-height:150px; object-fit:cover; }
  .p-photos figcaption{ text-align:center; font-size:11px; margin-top:5px; }
  .p-photos.single{ grid-template-columns: 1fr; max-width:60%; margin:0 auto; }
  .p-photos.single.small{ max-width:45%; }
  .p-empty-note{ color:#888; font-size:12px; margin:2px 0; }
  .p-finding-text{ font-size:12.5px; line-height:1.7; white-space:pre-wrap; margin:2px 0 10px; border-left:3px solid var(--ink); padding:2px 0 2px 10px; }

  .loader{ text-align:center; padding: 30px; color:var(--ink-soft); font-size:14px; }

  #printExportRoot{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #printExportRoot, #printExportRoot *{ visibility:visible; }
    #printExportRoot{ display:block; position:absolute; left:0; top:0; width:100%; }
    .print-page{ page-break-after: always; width:186mm; margin:0 auto; }
    .print-page:last-child{ page-break-after: auto; }
    .print-page .p-table{ font-size:9.5px; }
    .print-page .p-table td, .print-page .p-table th{ padding:4px 5px; }
    .print-page .p-head{ font-size:17px; padding:6px 0; }
    .print-page .p-photos figcaption{ font-size:9.5px; }
    .print-page .p-finding-text{ font-size:9.5px; }
    @page{ size: A4 portrait; margin: 12mm; }
  }

  .sketch-modal{ position:fixed; inset:0; background:#fff; z-index:300; display:none; flex-direction:column; }
  .sketch-modal.active{ display:flex; }
  .sketch-toolbar{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding: calc(10px + var(--safe-top)) 10px 10px; border-bottom:3px solid var(--accent); background:var(--ink); }
  .sketch-toolbar .closebtn{ background:none; border:none; color:#fff; font-size:20px; padding:4px 8px; }
  .tool-btn{ padding:9px 11px; border-radius:8px; border:1.5px solid #4a5a68; background:#26384a; color:#e7ebee; font-size:12.5px; font-weight:700; display:inline-flex; align-items:center; gap:5px; }
  .tool-btn.active{ background: var(--accent); color: var(--accent-ink); border-color:var(--accent); }
  .tool-btn input[type=file]{ display:none; }
  .swatch-btn{ width:26px; height:26px; border-radius:50%; border:2px solid #4a5a68; padding:0; flex-shrink:0; }
  .swatch-btn.active{ border-color:#fff; box-shadow:0 0 0 2px var(--accent); }
  .sketch-canvas-wrap{ flex:1; overflow:auto; background:#dfe0da; display:flex; justify-content:center; padding:16px 10px 40px; position:relative; }
  #sketchStage{ position:relative; background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.18); flex-shrink:0; }
  #bgCanvas{ position:absolute; top:0; left:0; display:block; }
  #inkCanvas{ position:absolute; top:0; left:0; touch-action:none; }
  #annLayer{ position:absolute; top:0; left:0; pointer-events:none; }
  .ann-item{ position:absolute; pointer-events:auto; cursor:grab; white-space:nowrap; user-select:none; padding:2px 5px; line-height:1.15; touch-action:none; }
  .ann-item.selected{ outline:1.5px dashed var(--tarp); background:rgba(255,255,255,.55); border-radius:4px; }
  .ann-resize{ position:absolute; right:-11px; bottom:-11px; width:22px; height:22px; background:var(--tarp); border-radius:50%; border:2px solid #fff; }
  .ann-edit-bar{ display:none; padding:10px 10px 6px; border-top:1px solid var(--line); background:#f6f6f2; }
  .ann-edit-bar.active{ display:block; }
  .ann-edit-bar input{ width:100%; padding:10px 12px; border-radius:9px; border:1.5px solid var(--line); font-size:16px; margin-bottom:8px; }
  .ann-edit-row{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .tool-btn-sm{ padding:7px 10px; border-radius:8px; border:1.5px solid var(--line); background:#fff; font-size:12.5px; font-weight:700; color:var(--ink); }
  .tool-btn-sm.danger{ color:var(--danger); border-color:var(--danger); }
  .sketch-footer{ padding: 10px 12px calc(10px + var(--safe-bottom)); border-top:1px solid var(--line); display:flex; gap:10px; background:#fff; }
  .sketch-footer button{ flex:1; }

  .picker-modal{ position:fixed; inset:0; background:rgba(28,43,57,.5); z-index:350; display:none; align-items:flex-end; }
  .picker-modal.active{ display:flex; }
  .picker-sheet{ background:#fff; width:100%; border-radius:18px 18px 0 0; padding:16px 16px calc(16px + var(--safe-bottom)); max-height:72vh; display:flex; flex-direction:column; }
  .picker-head{ display:flex; justify-content:space-between; align-items:center; font-size:17px; font-weight:700; margin-bottom:10px; }
  .picker-head button{ background:none; border:none; font-size:20px; color:var(--ink-soft); }
  .picker-chips{ overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:6px; margin-bottom:12px; min-height:40px; }
  .picker-chip{ display:flex; justify-content:space-between; align-items:center; padding:11px 12px; background:var(--paper); border:1px solid var(--line); border-radius:10px; }
  .picker-chip .chip-label{ flex:1; font-size:14.5px; }
  .picker-chip .chip-del{ background:none; border:none; color:var(--danger); font-size:18px; padding:2px 10px; }
  .picker-add-row{ display:flex; gap:8px; }
  .picker-add-row input{ flex:1; padding:11px 12px; border-radius:9px; border:1.5px solid var(--line); font-size:15px; }
</style>
</head>
<body>

<header class="top">
  <div>
    <div class="eyebrow">FIELD LOG · 発掘調査記録</div>
    <h1 id="siteHeaderName">調査日報</h1>
  </div>
  <div class="stamp" id="headerStamp"><div class="d">-</div><div class="w">-</div></div>
</header>

<main>

  <div class="view active" id="view-home">
    <button class="btn-primary" onclick="openEditor(null)">＋ 新規日報を作成</button>
    <div class="section-title">記録一覧</div>
    <div style="display:flex; justify-content:flex-end; margin:-4px 0 8px;">
      <button class="btn-ghost" id="selectModeBtn" onclick="toggleSelectMode()">複数選択してまとめて出力</button>
    </div>
    <div id="entryList"><div class="loader">読み込み中…</div></div>
  </div>

  <div class="bulk-bar" id="bulkBar" style="display:none;">
    <div class="bulk-bar-row">
      <button class="btn-ghost" onclick="selectAllToggle()" id="selectAllBtn">全選択</button>
      <span id="bulkCount" style="font-size:13px;color:var(--ink-soft);font-weight:700;">0件選択中</span>
      <button class="btn-ghost" onclick="toggleSelectMode()">選択を終了</button>
    </div>
    <div class="bulk-bar-row">
      <button class="btn-secondary" onclick="bulkExportPDF()">PDFにまとめて出力</button>
      <button class="btn-primary" style="box-shadow:none;" onclick="bulkExportExcel()">Excelにまとめて出力</button>
    </div>
  </div>

  <div class="view" id="view-editor">
    <div class="toolbar">
      <button class="backbtn" onclick="goHome()">‹ 一覧へ</button>
      <button class="btn-ghost" id="copyPrevBtn" onclick="copyFromPrevious()">前回をコピー</button>
    </div>
    <h2 class="mincho" style="font-size:21px;margin:2px 0 14px;">調査日報の作成</h2>

    <div class="card">
      <div class="row2">
        <div class="field"><label>日時</label><input type="date" id="f_date" onchange="onDateChange()"></div>
        <div class="field">
          <label>天気</label>
          <div class="combo-row">
            <input type="text" id="f_weather" >
            <button type="button" class="combo-btn" onclick="openPicker('weather', v=>{document.getElementById('f_weather').value=v;}, '天気を選択')">▾</button>
          </div>
        </div>
      </div>
      <div class="field" style="margin-bottom:0;"><label id="dateDisplayLabel">和暦・曜日</label></div>
    </div>

    <div class="section-title">業務情報</div>
    <div class="card">
      <div class="field"><label>業務名</label>
        <div class="combo-row"><input type="text" id="f_gyoumu" >
        <button type="button" class="combo-btn" onclick="openPicker('gyoumu', v=>{document.getElementById('f_gyoumu').value=v;}, '業務名を選択')">▾</button></div>
      </div>
      <div class="field"><label>発注先</label>
        <div class="combo-row"><input type="text" id="f_hacchu" >
        <button type="button" class="combo-btn" onclick="openPicker('hacchu', v=>{document.getElementById('f_hacchu').value=v;}, '発注先を選択')">▾</button></div>
      </div>
      <div class="field"><label>担当課</label>
        <div class="combo-row"><input type="text" id="f_tantoka" >

<script>
/* ---------------- Library loading (multi-CDN fallback) ----------------
   Libraries are loaded on demand (only when actually needed) with fallback
   mirrors, so a single blocked/unreachable CDN doesn't break the feature. */
function loadScriptOnce(url){
  return new Promise((resolve, reject)=>{
    const existing = document.querySelector(`script[data-src="${url}"]`);
    if(existing){ existing.addEventListener('load', ()=>resolve(url)); existing.addEventListener('error', ()=>reject(new Error('load failed: '+url))); return; }
    const s = document.createElement('script');
    s.src = url;
    s.dataset.src = url;
    s.onload = ()=>resolve(url);
    s.onerror = ()=>reject(new Error('load failed: '+url));
    document.head.appendChild(s);
  });
}
async function loadFirstAvailable(urls){
  let lastErr;
  for(const url of urls){
    try{ await loadScriptOnce(url); return url; }
    catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('no source succeeded');
}

let exceljsReady = null;
async function ensureExcelJS(){
  if(window.ExcelJS) return true;
  if(!exceljsReady){
    exceljsReady = loadFirstAvailable([
      'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js',
      'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js',
      'https://unpkg.com/exceljs@4.4.0/dist/exceljs.min.js'
    ]).catch(e=>{ console.error('ExcelJS failed to load', e); return null; });
  }
  await exceljsReady;
  return !!window.ExcelJS;
}

let pdfjsReady = null;
async function ensurePdfJS(){
  if(window.pdfjsLib) return true;
  if(!pdfjsReady){
    pdfjsReady = (async ()=>{
      const bases = [
        ['https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'],
        ['https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js', 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'],
        ['https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js', 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js']
      ];
      for(const [scriptUrl, workerUrl] of bases){
        try{
          await loadScriptOnce(scriptUrl);
          pdfjsLib.GlobalWorkerOptions.workerSrc = workerUrl;
          return true;
        }catch(e){ /* try next mirror */ }
      }
      return false;
    })();
  }
  return await pdfjsReady;
}

/* ---------------- Utility ---------------- */
const WD = ['日','月','火','水','木','金','土'];
function reiwaYear(y){ return y - 2018; }
function jpDateParts(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const wd = WD[dt.getDay()];
  return { y, m, d, wd, reiwa: reiwaYear(y) };
}
function todayStr(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

/* ---------------- Binary helpers (for robust Excel image embedding + verification) ---------------- */
function dataUrlToUint8Array(dataUrl){
  const base64 = dataUrl.includes(',') ? dataUrl.split(',')[1] : dataUrl;
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++){ bytes[i] = binary.charCodeAt(i); }
  return bytes;
}
// Reads just the ZIP central directory (filenames + uncompressed sizes) without decompressing
// anything. Used only to verify, after the fact, whether the images we asked ExcelJS to embed
// actually made it into xl/media/ inside the generated .xlsx — this tells us definitively whether
// a "photo missing" report is a data problem (nothing embedded) or a viewer/rendering problem
// (data embedded fine, but the previewer app doesn't draw it).
function readZipEntries(bufferLike){
  let buffer;
  if(bufferLike instanceof ArrayBuffer){
    buffer = bufferLike;
  } else if(ArrayBuffer.isView(bufferLike)){
    // wb.xlsx.writeBuffer() returns a Uint8Array / Node-Buffer-polyfill in some browser builds
    // of ExcelJS, not a raw ArrayBuffer — slice out exactly the bytes this view covers.
    buffer = bufferLike.buffer.slice(bufferLike.byteOffset, bufferLike.byteOffset + bufferLike.byteLength);
  } else {
    throw new Error('readZipEntries: unsupported input type ' + Object.prototype.toString.call(bufferLike));
  }
  const view = new DataView(buffer);
  const len = buffer.byteLength;
  const scanBack = Math.min(len, 65557);
  let eocd = -1;
  for(let i = len - 22; i >= len - scanBack; i--){
    if(i < 0) break;
    if(view.getUint32(i, true) === 0x06054b50){ eocd = i; break; }
  }
  if(eocd < 0) throw new Error('zip end-of-central-directory not found');
  const totalEntries = view.getUint16(eocd + 10, true);
  let ptr = view.getUint32(eocd + 16, true);
  const entries = [];
  const decoder = new TextDecoder('utf-8');
  for(let i=0; i<totalEntries; i++){
    if(view.getUint32(ptr, true) !== 0x02014b50) break;
    const compSize = view.getUint32(ptr+20, true);
    const uncompSize = view.getUint32(ptr+24, true);
    const nameLen = view.getUint16(ptr+28, true);
    const extraLen = view.getUint16(ptr+30, true);
    const commentLen = view.getUint16(ptr+32, true);
    const name = decoder.decode(new Uint8Array(buffer, ptr+46, nameLen));
    entries.push({ name, compSize, uncompSize });
    ptr += 46 + nameLen + extraLen + commentLen;
  }
  return entries;
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function genId(prefix){ return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------------- Storage helpers ----------------
   This app can run in two environments:
   1) Inside a Claude artifact -> uses Claude's built-in window.storage (syncs with the account).
   2) As a standalone HTML file opened in a normal browser tab -> window.storage doesn't exist,
      so we fall back to the browser's own IndexedDB so saving still works reliably.
   NOTE: some in-app "quick look" / external-file preview panes (e.g. a mail or Files app's
   built-in viewer) sandbox the page and block IndexedDB entirely. For reliable long-term use
   outside Claude, open this file as a normal page in Safari (not a preview pane) and consider
   "Add to Home Screen".
------------------------------------------------------ */
let storageBackend = 'none';
let idbPromise = null;
function openIDB(){
  if(idbPromise) return idbPromise;
  idbPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error('indexedDB unavailable')); return; }
    const req = indexedDB.open('fieldlog-db', 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore('kv'); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return idbPromise;
}
async function idbSet(key, value){
  const db = await openIDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction('kv','readwrite');
    tx.objectStore('kv').put(value, key);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbGet(key){
  const db = await openIDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction('kv','readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = ()=>resolve(req.result === undefined ? null : req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbDelete(key){
  const db = await openIDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction('kv','readwrite');
    tx.objectStore('kv').delete(key);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbListKeys(prefix){
  const db = await openIDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction('kv','readonly');
    const req = tx.objectStore('kv').getAllKeys();
    req.onsuccess = ()=>resolve(req.result.map(String).filter(k=> !prefix || k.startsWith(prefix)));
    req.onerror = ()=>reject(req.error);
  });
}
async function detectStorageBackend(){
  if(window.storage && typeof window.storage.set === 'function'){
    try{
      const probe = await window.storage.set('__probe__', '1', false);
      if(probe){ storageBackend = 'claude'; window.storage.delete('__probe__', false).catch(()=>{}); return; }
    }catch(e){}
  }
  if(window.indexedDB){
    try{ await openIDB(); storageBackend = 'idb'; return; }
    catch(e){}
  }
  storageBackend = 'none';
}
async function storeSet(key, obj){
  try{
    const json = JSON.stringify(obj);
    if(storageBackend === 'claude'){
      const r = await window.storage.set(key, json, false);
      if(!r) throw new Error('storage.set returned empty result');
    } else if(storageBackend === 'idb'){
      await idbSet(key, json);
    } else {
      throw new Error('この端末では保存機能が利用できません');
    }
    return true;
  }catch(e){ console.error('storeSet failed', key, e); return false; }
}
async function storeGet(key){
  try{
    if(storageBackend === 'claude'){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    } else if(storageBackend === 'idb'){
      const v = await idbGet(key);
      return v ? JSON.parse(v) : null;
    }
    return null;
  }catch(e){ return null; }
}
async function storeDelete(key){
  try{
    if(storageBackend === 'claude') await window.storage.delete(key, false);
    else if(storageBackend === 'idb') await idbDelete(key);
  }catch(e){}
}

/* ---------------- Caption helpers (content + direction) ---------------- */
function combineCaption(content, direction){
  content = (content||'').trim(); direction = (direction||'').trim();
  if(content && direction) return `${content}（${direction}から）`;
  if(content) return content;
  if(direction) return `（${direction}から）`;
  return '';
}
function updateCaptionParts(list, idx, field, val, fromPicker, listSelector){
  const item = list[idx];
  if(!item) return;
  if(field === 'content') item.contentVal = val; else item.directionVal = val;
  const combined = combineCaption(item.contentVal, item.directionVal);
  item.caption = combined;
  const blocks = document.querySelectorAll(listSelector + ' .photo-block');
  const block = blocks[idx];
  if(block){
    const finalInput = block.querySelector('.caption-final');
    if(finalInput) finalInput.value = combined;
    if(fromPicker){
      const inputs = block.querySelectorAll('.combo-row.small input');
      if(field === 'content' && inputs[0]) inputs[0].value = val;
      if(field === 'direction' && inputs[1]) inputs[1].value = val;
    }
  }
}

function resizeImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let {width, height} = img;
        if(width > height && width > maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
        else if(height > maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve({dataUrl: canvas.toDataURL('image/jpeg', quality), width, height});
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------------- Sketch drawing modal ---------------- */
let sketchEditIndex = null;
let sketchTargetList = null;
let tool = 'pen';
let penColor = '#111111';
const PEN_WIDTH = 3.5;
const ERASER_WIDTH = 26;
let drawing = false;
let undoStack = [];
let bgCtx, inkCtx, bgCanvas, inkCanvas, stage, annLayer;
let textAnnotations = [];
let selectedAnnId = null;
let annDrag = null;
let annResize = null;

function initSketchCanvases(){
  bgCanvas = document.getElementById('bgCanvas');
  inkCanvas = document.getElementById('inkCanvas');
  stage = document.getElementById('sketchStage');
  annLayer = document.getElementById('annLayer');
  bgCtx = bgCanvas.getContext('2d');
  inkCtx = inkCanvas.getContext('2d');
}

function setCanvasSize(w, h){
  bgCanvas.width = w; bgCanvas.height = h;
  inkCanvas.width = w; inkCanvas.height = h;
  const wrapEl = document.getElementById('sketchCanvasWrap');
  const wrapWidth = wrapEl.clientWidth - 20;
  const displayW = Math.min(w, 1000, wrapWidth > 100 ? wrapWidth : 1000);
  const displayH = Math.round(h * (displayW / w));
  stage.style.width = displayW + 'px';
  stage.style.height = displayH + 'px';
  bgCanvas.style.width = displayW + 'px';
  bgCanvas.style.height = displayH + 'px';
  inkCanvas.style.width = displayW + 'px';
  inkCanvas.style.height = displayH + 'px';
  annLayer.style.width = displayW + 'px';
  annLayer.style.height = displayH + 'px';
  textAnnotations = [];
  selectedAnnId = null;
  hideAnnEditBar();
  renderAnnotations();
}
function canvasScale(){
  const rect = bgCanvas.getBoundingClientRect();
  return rect.width / bgCanvas.width;
}
function blankCanvas(){
  setCanvasSize(1000, 1400);
  bgCtx.fillStyle = '#ffffff';
  bgCtx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
  inkCtx.clearRect(0,0,inkCanvas.width, inkCanvas.height);
  undoStack = [];
}

function openSketchModal(editIndex, targetList){
  if(!bgCanvas) initSketchCanvases();
  sketchEditIndex = editIndex;
  sketchTargetList = targetList;
  document.getElementById('sketchModal').classList.add('active');
  setTool('pen');
  setColor('#111111');
  if(editIndex !== null && targetList && targetList[editIndex]){
    const s = targetList[editIndex];
    const img = new Image();
    img.onload = ()=>{
      setCanvasSize(img.width, img.height);
      bgCtx.drawImage(img, 0, 0, img.width, img.height);
      inkCtx.clearRect(0,0,inkCanvas.width, inkCanvas.height);
      undoStack = [];
    };
    img.src = s.dataUrl;
  } else {
    blankCanvas();
  }
  bindCanvasEvents();
}
function closeSketchModal(){
  if(annDrag) onAnnDragEnd();
  if(annResize) onAnnResizeEnd();
  document.getElementById('sketchModal').classList.remove('active');
  sketchEditIndex = null;
  sketchTargetList = null;
}

function setTool(t){
  tool = t;
  ['pen','eraser','text'].forEach(k=>{
    document.getElementById('tool-'+k).classList.toggle('active', k===t);
  });
}
function setColor(c){
  penColor = c;
  document.querySelectorAll('#sketchModal .sketch-toolbar .swatch-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.c === c);
  });
}

function pushUndo(){
  try{
    undoStack.push(inkCtx.getImageData(0,0,inkCanvas.width, inkCanvas.height));
    if(undoStack.length > 25) undoStack.shift();
  }catch(e){}
}
function undoStroke(){
  if(!undoStack.length){ toast('これ以上戻せません'); return; }
  const snap = undoStack.pop();
  inkCtx.putImageData(snap, 0, 0);
}
function clearInk(){
  pushUndo();
  inkCtx.clearRect(0,0,inkCanvas.width, inkCanvas.height);
}

function getPos(e){
  const rect = inkCanvas.getBoundingClientRect();
  const scaleX = inkCanvas.width / rect.width;
  const scaleY = inkCanvas.height / rect.height;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  return { x: (cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY };
}

let evtsBound = false;
function bindCanvasEvents(){
  if(evtsBound) return;
  evtsBound = true;
  inkCanvas.addEventListener('pointerdown', onPointerDown);
  inkCanvas.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
}
function onPointerDown(e){
  if(selectedAnnId){ deselectAnn(); }
  if(tool === 'text'){
    const p = getPos(e);
    const id = genId('t');
    const size = Math.max(24, Math.round(bgCanvas.width * 0.032));
    textAnnotations.push({ id, x:p.x, y:p.y, text:'', color: penColor, size });
    selectedAnnId = id;
    renderAnnotations();
    showAnnEditBar('');
    return;
  }
  e.preventDefault();
  drawing = true;
  pushUndo();
  const p = getPos(e);
  inkCtx.beginPath();
  inkCtx.moveTo(p.x, p.y);
  inkCtx.lineCap = 'round';
  inkCtx.lineJoin = 'round';
  if(tool === 'eraser'){
    inkCtx.globalCompositeOperation = 'destination-out';
    inkCtx.lineWidth = ERASER_WIDTH;
  } else {
    inkCtx.globalCompositeOperation = 'source-over';
    inkCtx.strokeStyle = penColor;
    inkCtx.lineWidth = PEN_WIDTH;
  }
}
function onPointerMove(e){
  if(!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  inkCtx.lineTo(p.x, p.y);
  inkCtx.stroke();
}
function onPointerUp(){
  if(drawing){ inkCtx.globalCompositeOperation = 'source-over'; }
  drawing = false;
}

/* ---- Text annotations: draggable / resizable / editable ---- */
function renderAnnotations(){
  if(!annLayer) return;
  const scale = canvasScale();
  annLayer.innerHTML = '';
  textAnnotations.forEach(a=>{
    const el = document.createElement('div');
    el.className = 'ann-item' + (a.id === selectedAnnId ? ' selected' : '');
    el.style.left = (a.x*scale) + 'px';
    el.style.top = (a.y*scale) + 'px';
    el.style.fontSize = (a.size*scale) + 'px';
    el.style.color = a.color;
    el.textContent = a.text || '（文字）';
    el.dataset.id = a.id;
    el.addEventListener('pointerdown', onAnnPointerDown);
    if(a.id === selectedAnnId){
      const handle = document.createElement('div');
      handle.className = 'ann-resize';
      handle.addEventListener('pointerdown', onAnnResizeStart);
      el.appendChild(handle);
    }
    annLayer.appendChild(el);
  });
}
function onAnnPointerDown(e){
  e.stopPropagation(); e.preventDefault();
  const id = e.currentTarget.dataset.id;
  const a = textAnnotations.find(x=>x.id===id);
  if(!a) return;
  selectedAnnId = id;
  renderAnnotations();
  showAnnEditBar(a.text);
  const scale = canvasScale();
  annDrag = {
    id,
    startClientX: (e.touches ? e.touches[0].clientX : e.clientX),
    startClientY: (e.touches ? e.touches[0].clientY : e.clientY),
    startX: a.x, startY: a.y, scale
  };
  window.addEventListener('pointermove', onAnnDragMove);
  window.addEventListener('pointerup', onAnnDragEnd);
}
function onAnnDragMove(e){
  if(!annDrag) return;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  const dx = (cx - annDrag.startClientX)/annDrag.scale;
  const dy = (cy - annDrag.startClientY)/annDrag.scale;
  const a = textAnnotations.find(x=>x.id===annDrag.id);
  if(a){ a.x = annDrag.startX+dx; a.y = annDrag.startY+dy; renderAnnotations(); }
}
function onAnnDragEnd(){
  window.removeEventListener('pointermove', onAnnDragMove);
  window.removeEventListener('pointerup', onAnnDragEnd);
  annDrag = null;
}
function onAnnResizeStart(e){
  e.stopPropagation(); e.preventDefault();
  const id = e.currentTarget.parentElement.dataset.id;
  const a = textAnnotations.find(x=>x.id===id);
  if(!a) return;
  annResize = {
    id,
    startClientY: (e.touches ? e.touches[0].clientY : e.clientY),
    startSize: a.size, scale: canvasScale()
  };
  window.addEventListener('pointermove', onAnnResizeMove);
  window.addEventListener('pointerup', onAnnResizeEnd);
}
function onAnnResizeMove(e){
  if(!annResize) return;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY);
  const dy = (cy - annResize.startClientY)/annResize.scale;
  const a = textAnnotations.find(x=>x.id===annResize.id);
  if(a){ a.size = Math.max(10, Math.round(annResize.startSize + dy)); renderAnnotations(); }
}
function onAnnResizeEnd(){
  window.removeEventListener('pointermove', onAnnResizeMove);
  window.removeEventListener('pointerup', onAnnResizeEnd);
  annResize = null;
}
function showAnnEditBar(text){
  document.getElementById('annEditBar').classList.add('active');
  const input = document.getElementById('annTextInput');
  input.value = text || '';
  setTimeout(()=>input.focus(), 50);
}
function hideAnnEditBar(){
  document.getElementById('annEditBar').classList.remove('active');
}
function onAnnTextInput(val){
  const a = textAnnotations.find(x=>x.id===selectedAnnId);
  if(a){ a.text = val; renderAnnotations(); }
}
function setAnnColor(c){
  const a = textAnnotations.find(x=>x.id===selectedAnnId);
  if(a){ a.color = c; renderAnnotations(); }
}
function resizeSelectedAnn(delta){
  const a = textAnnotations.find(x=>x.id===selectedAnnId);
  if(a){ a.size = Math.max(10, a.size + delta*4); renderAnnotations(); }
}
function deleteSelectedAnn(){
  textAnnotations = textAnnotations.filter(x=>x.id!==selectedAnnId);
  selectedAnnId = null;
  hideAnnEditBar();
  renderAnnotations();
}
function deselectAnn(){
  selectedAnnId = null;
  hideAnnEditBar();
  renderAnnotations();
}

function loadBgFromPhoto(evt){
  const file = evt.target.files[0];
  evt.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height;
      const maxDim = 1500;
      if(w > maxDim || h > maxDim){
        if(w > h){ h = Math.round(h*maxDim/w); w = maxDim; } else { w = Math.round(w*maxDim/h); h = maxDim; }
      }
      setCanvasSize(w, h);
      bgCtx.fillStyle = '#fff';
      bgCtx.fillRect(0,0,w,h);
      bgCtx.drawImage(img, 0, 0, w, h);
      inkCtx.clearRect(0,0,w,h);
      undoStack = [];
      toast('画像を読み込みました');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function loadBgFromPDF(evt){
  const file = evt.target.files[0];
  evt.target.value = '';
  if(!file) return;
  toast('PDF機能を読み込んでいます…');
  const ok = await ensurePdfJS();
  if(!ok){ toast('PDF機能の読み込みに失敗しました。通信環境をご確認ください。'); return; }
  toast('PDFを読み込んでいます…');
  try{
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    const page = await pdf.getPage(1);
    const baseViewport = page.getViewport({scale: 1});
    const scale = Math.min(1500 / baseViewport.width, 1500 / baseViewport.height, 3);
    const viewport = page.getViewport({scale});
    setCanvasSize(Math.round(viewport.width), Math.round(viewport.height));
    bgCtx.fillStyle = '#fff';
    bgCtx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
    await page.render({canvasContext: bgCtx, viewport}).promise;
    inkCtx.clearRect(0,0,inkCanvas.width, inkCanvas.height);
    undoStack = [];
    toast('PDFを読み込みました（1ページ目）');
  }catch(e){
    console.error(e);
    toast('PDFの読み込みに失敗しました');
  }
}

function finishSketch(){
  const out = document.createElement('canvas');
  out.width = bgCanvas.width; out.height = bgCanvas.height;
  const octx = out.getContext('2d');
  octx.drawImage(bgCanvas, 0, 0);
  octx.drawImage(inkCanvas, 0, 0);
  textAnnotations.forEach(a=>{
    if(!a.text) return;
    octx.font = `${a.size}px "Zen Kaku Gothic New", sans-serif`;
    octx.fillStyle = a.color;
    octx.textBaseline = 'top';
    octx.fillText(a.text, a.x, a.y);
  });
  const dataUrl = out.toDataURL('image/jpeg', 0.82);
  const list = sketchTargetList || currentSketches;
  const prevItem = (sketchEditIndex !== null) ? list[sketchEditIndex] : null;
  const item = {
    type: 'image',
    caption: prevItem ? (prevItem.caption||'') : '',
    contentVal: prevItem ? (prevItem.contentVal||'') : '',
    directionVal: prevItem ? (prevItem.directionVal||'') : '',
    dataUrl, width: out.width, height: out.height
  };
  if(prevItem && prevItem.id){
    storeDelete(`asset:${prevItem.id}`);
  }
  if(sketchEditIndex !== null && list[sketchEditIndex]){
    list[sketchEditIndex] = item;
  } else {
    list.push(item);
  }
  renderSketchList();
  closeSketchModal();
  toast('略図を追加しました');
}

async function hydratePhotoList(refs){
  const items = await Promise.all((refs||[]).map(async id=>{
    const a = await storeGet(`asset:${id}`);
    return a ? Object.assign({id, type:'image'}, a) : null;
  }));
  return items.filter(Boolean);
}
// 作業所見・略図 refs can be a mix of text findings (kept inline, no asset needed) and image
// sketches (stored in asset:{id}). Also accepts the legacy format where every ref was just a
// plain asset-id string (pre-dates the text-finding feature), so old saved entries still load.
async function hydrateFindingsList(refs){
  const items = await Promise.all((refs||[]).map(async entry=>{
    if(typeof entry === 'string'){
      const a = await storeGet(`asset:${entry}`);
      return a ? Object.assign({id:entry, type:'image'}, a) : null;
    }
    if(entry && entry.type === 'text'){
      return { type:'text', id: entry.id || genId('tx'), text: entry.text || '' };
    }
    if(entry && entry.type === 'image' && entry.ref){
      const a = await storeGet(`asset:${entry.ref}`);
      return a ? Object.assign({id:entry.ref, type:'image'}, a) : null;
    }
    return null;
  }));
  return items.filter(Boolean);
}
async function persistFindingsList(list){
  const refs = [];
  for(const item of list){
    if(item.type === 'text'){
      if(!item.id) item.id = genId('tx');
      refs.push({ type:'text', id:item.id, text: item.text || '' });
    } else {
      let id = item.id;
      if(!id) id = genId('as');
      const ok = await storeSet(`asset:${id}`, {
        caption: item.caption || '',
        contentVal: item.contentVal || '',
        directionVal: item.directionVal || '',
        dataUrl: item.dataUrl, width: item.width, height: item.height
      });
      if(!ok) throw new Error('略図の保存に失敗しました（通信環境をご確認ください）');
      item.id = id;
      refs.push({ type:'image', ref:id });
    }
  }
  return refs;
}
async function persistAssetList(list, typeLabel){
  const refs = [];
  for(const item of list){
    let id = item.id;
    if(!id) id = genId('as');
    const ok = await storeSet(`asset:${id}`, {
      caption: item.caption || '',
      contentVal: item.contentVal || '',
      directionVal: item.directionVal || '',
      dataUrl: item.dataUrl, width: item.width, height: item.height
    });
    if(!ok) throw new Error(typeLabel + 'の保存に失敗しました（通信環境をご確認ください）');
    item.id = id;
    refs.push(id);
  }
  return refs;
}

async function saveEntry(){
  const data = collectForm();
  if(!data.date){ toast('日時を入力してください'); return; }
  toast('保存しています…');
  try{
    const sketchRefs = await persistFindingsList(currentSketches);
    const photoRefs = await persistAssetList(currentPhotos, '写真');

    const meta = Object.assign({}, data);
    delete meta.photos;
    delete meta.sketches;
    meta.sketchRefs = sketchRefs;
    meta.photoRefs = photoRefs;

    const newKey = `report:${data.date}`;
    const ok = await storeSet(newKey, meta);
    if(!ok){ toast('保存に失敗しました。通信環境をご確認ください'); return; }

    if(currentEditKey && currentEditKey !== newKey){
      await storeDelete(currentEditKey);
    }
    const wasEdit = !!currentEditKey;
    currentEditKey = newKey;
    toast(wasEdit ? '日報を上書き保存しました' : '日報を保存しました');
    showPreview(data);
  }catch(err){
    console.error(err);
    toast(err.message || '保存に失敗しました');
  }
}

function buildImageGridHtml(items, small){
  if(!items || !items.length) return `<p class="p-empty-note">添付なし</p>`;
  return `<div class="p-photos ${items.length===1?'single':''} ${small?'small':''}">` +
    items.map(it=>`<figure><img src="${it.dataUrl}"><figcaption>${escapeHtml(it.caption||'')}</figcaption></figure>`).join('') +
  `</div>`;
}
// Like buildImageGridHtml, but walks a mixed list of text findings and sketch images in the
// order the user arranged them: text renders as a full-width paragraph, and images are paired
// up two-at-a-time (matching the Excel layout) whenever they appear consecutively.
function buildFindingsHtml(items){
  if(!items || !items.length) return `<p class="p-empty-note">添付なし</p>`;
  let html = '';
  let buffer = [];
  const flush = () => {
    if(!buffer.length) return;
    html += `<div class="p-photos ${buffer.length===1?'single':''}">` +
      buffer.map(it=>`<figure><img src="${it.dataUrl}"><figcaption>${escapeHtml(it.caption||'')}</figcaption></figure>`).join('') +
    `</div>`;
    buffer = [];
  };
  items.forEach(it=>{
    if(it.type === 'text'){
      flush();
      if(it.text && it.text.trim()){
        html += `<p class="p-finding-text">${escapeHtml(it.text)}</p>`;
      }
    } else {
      buffer.push(it);
      if(buffer.length === 2) flush();
    }
  });
  flush();
  return html || `<p class="p-empty-note">添付なし</p>`;
}

function waitForImagesToLoad(container){
  const imgs = Array.from(container.querySelectorAll('img'));
  if(!imgs.length) return Promise.resolve();
  return Promise.all(imgs.map(img=>{
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(res=>{
      img.addEventListener('load', res, { once:true });
      img.addEventListener('error', res, { once:true });
    });
  }));
}
async function runNativePrint(){
  const root = document.getElementById('printExportRoot');
  await waitForImagesToLoad(root);
  // wait two animation frames so the browser has actually painted the loaded images before printing
  await new Promise(res => requestAnimationFrame(()=>requestAnimationFrame(res)));
  toast('印刷画面が開きます。プレビューの共有ボタンから「PDFを保存」を選んでください');
  window.print();
}

  document.getElementById('printExportRoot').innerHTML = buildReportPrintBlock(currentPreviewData);

async function quickExportPDF(entryKey, evt){
  if(evt) evt.stopPropagation();
  toast('日報を読み込んでいます…');
  const data = await fetchFullReport(entryKey);
  if(!data){ toast('データが見つかりませんでした'); return; }
  document.getElementById('printExportRoot').innerHTML = buildReportPrintBlock(data);
  await runNativePrint();
}
async function bulkExportPDF(){

async function downloadSingleExcel(data){
  const ok = await ensureExcelJS();
  if(!ok){ toast('Excel機能の読み込みに失敗しました。通信環境をご確認ください。'); return; }
  toast('Excelを作成しています…');
  try{
    const wb = new ExcelJS.Workbook();
    wb.creator = data.kirokusha || '';
    addReportWorksheet(wb, data);
    const fname = `調査日報_${(data.iseki||'').replace(/[\\/:*?"<>|]/g,'')}_${data.date}.xlsx`;
    await downloadWorkbook(wb, fname);
    toast('Excelファイルを出力しました');
  }catch(e){
    console.error(e);
    toast('Excel出力に失敗しました');
  }
}
async function bulkExportExcel(){
  if(!selectedKeys.size){ toast('日報を選択してください'); return; }
  const ok = await ensureExcelJS();

  toast('Excelを作成しています…');

    toast('Excel出力に失敗しました');

}
async function downloadWorkbook(wb, filename){
  const buffer = await wb.xlsx.writeBuffer();
  const expected = wb.__expectedImages || 0;
  const jsErrors = wb.__imageErrors || 0;
  try{
    const entries = readZipEntries(buffer);
    const media = entries.filter(e=>e.name.startsWith('xl/media/'));
    const summary = media.map(e=>`・${e.name}: ${(e.uncompSize/1024).toFixed(1)}KB`).join('\n');
    console.log(`[Excel診断] 期待した画像数=${expected} / JS側での埋め込みエラー=${jsErrors} / zip内で見つかった画像=${media.length}`, media);
    if(jsErrors > 0){
      showDiagPanel(
        `⚠ 画像埋め込みの診断結果\n\n`+
        `${jsErrors}件の画像で、変換処理中にエラーが発生しました。\n`+
        `期待した画像数：${expected}\n実際にファイルに含まれる画像：${media.length}\n\n`+
        `この画面のスクリーンショットを次の返信で共有してください。`
      );
    } else if(expected > 0 && media.length < expected){
      showDiagPanel(
        `⚠ 画像埋め込みの診断結果\n\n`+
        `本来${expected}枚の画像を埋め込むはずが、生成したExcelファイル自体の中に${media.length}枚しか含まれていませんでした。\n\n`+
        `これはビューアの表示不具合ではなく、書き出し処理側で画像データが失われていることを意味します。\n\n`+
        `この画面のスクリーンショットを次の返信で共有してください。`
      );
    } else if(expected > 0){
      showDiagPanel(
        `✓ 画像埋め込みの診断結果\n\n`+
        `${media.length}枚の画像データがExcelファイル内に正しく含まれていることを確認しました：\n${summary}\n\n`+
        `もしこれでも写真が表示されない場合、原因はファイル側ではなく、開いているビューア（プレビュー／Numbersなど）側の表示制限です。実際のExcelアプリやGoogleスプレッドシートで開いた場合の見え方を教えてください。`
      );
    }
  }catch(diagErr){
    console.error('zip診断に失敗', diagErr);
    showDiagPanel(`⚠ 診断処理自体でエラーが発生しました：\n${diagErr && diagErr.message}\n\nこの画面のスクリーンショットを次の返信で共有してください。`);
  }
  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function addReportWorksheet(wb, data){
  const ws = wb.addWorksheet(data.date, { views:[{ showGridLines:false }] });
  ws.properties.defaultRowHeight = 18;
  for(let c=1; c<=10; c++){ ws.getColumn(c).width = 11; }
  ws.pageSetup = {
    paperSize: 9, orientation: 'portrait',
    fitToPage: true, fitToWidth: 1, fitToHeight: 0,
    horizontalCentered: true,
    margins: { left:0.4, right:0.4, top:0.5, bottom:0.5, header:0.2, footer:0.2 }
  };

  const thinBorder = { style:'thin', color:{argb:'FF1C2B39'} };
  const border = { top:thinBorder, left:thinBorder, bottom:thinBorder, right:thinBorder };
  const labelFill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFE9E7DE'} };

  function cell(addr){ const c = ws.getCell(addr); c.border = border; return c; }
  function label(addr, text){
    const c = cell(addr);
    c.value = text; c.fill = labelFill; c.font = { bold:true, size:10.5 };
    c.alignment = { vertical:'middle', horizontal:'center', wrapText:true };
    return c;
  }
  function value(addr, text, opts={}){
    const c = cell(addr);
    c.value = text || '';
    c.font = { size:11, bold: !!opts.bold };
    c.alignment = { vertical: opts.valign||'middle', horizontal: opts.align||'left', wrapText:true };
    return c;
  }
  function mergeLabelValue(labelRange, labelText, valueRange, valueText, opts={}){
    ws.mergeCells(labelRange);
    label(labelRange.split(':')[0], labelText);
    ws.mergeCells(valueRange);
    value(valueRange.split(':')[0], valueText, opts);
  }

  let r = 1;
  ws.mergeCells(`A${r}:J${r}`);
  const titleCell = ws.getCell(`A${r}`);
  titleCell.value = '調 査 日 報';
  titleCell.font = { bold:true, size:20, name:'Yu Mincho' };
  titleCell.alignment = { horizontal:'center', vertical:'middle' };
  titleCell.border = border;
  ws.getRow(r).height = 34;
  r++;

  mergeLabelValue(`A${r}:B${r}`, '日時', `C${r}:F${r}`, `令和${data.reiwa}年${data.date.split('-')[1]}月${data.date.split('-')[2]}日　${data.weekday}曜日`);
  ws.mergeCells(`G${r}:G${r}`); label(`G${r}`, '天気');
  ws.mergeCells(`H${r}:J${r}`); value(`H${r}`, data.weather);
  r++;

  mergeLabelValue(`A${r}:B${r}`, '業務名', `C${r}:J${r}`, data.gyoumu);
  ws.getRow(r).height = 30;
  r++;

  // 発注先 block: label + value merged vertically across 2 rows, 担当課/監督員 stacked on the right
  ws.mergeCells(`A${r}:B${r+1}`); label(`A${r}`, '発注先');
  ws.mergeCells(`C${r}:D${r+1}`); value(`C${r}`, data.hacchu);
  ws.mergeCells(`E${r}:F${r}`); label(`E${r}`, '担当課');
  ws.mergeCells(`G${r}:J${r}`); value(`G${r}`, data.tantoka);
  r++;
  ws.mergeCells(`E${r}:F${r}`); label(`E${r}`, '監督員');
  ws.mergeCells(`G${r}:J${r}`); value(`G${r}`, data.kantoku);
  r++;

  mergeLabelValue(`A${r}:B${r}`, '遺跡名', `C${r}:D${r}`, data.iseki);
  ws.mergeCells(`E${r}:F${r}`); label(`E${r}`, '記録者');
  ws.mergeCells(`G${r}:J${r}`); value(`G${r}`, data.kirokusha);
  r++;

  // 参加者 block: label merged vertically across 3 rows (調査員/作業員/来訪者)
  ws.mergeCells(`A${r}:B${r+2}`); label(`A${r}`, '参加者');
  ws.mergeCells(`C${r}:D${r}`); label(`C${r}`, '調査員');
  ws.mergeCells(`E${r}:F${r}`); value(`E${r}`, data.chousain);
  ws.mergeCells(`G${r}:H${r}`); label(`G${r}`, '調査指導');
  ws.mergeCells(`I${r}:J${r}`); value(`I${r}`, data.shidou);
  r++;
  ws.mergeCells(`C${r}:D${r}`); label(`C${r}`, '作業員');
  ws.mergeCells(`E${r}:J${r}`); value(`E${r}`, data.sagyouin);
  ws.getRow(r).height = 24;
  r++;
  ws.mergeCells(`C${r}:D${r}`); label(`C${r}`, '来訪者');
  ws.mergeCells(`E${r}:J${r}`); value(`E${r}`, data.raihousha);
  r++;

  ws.mergeCells(`A${r}:B${r}`); label(`A${r}`, '作業経過');
  ws.mergeCells(`C${r}:J${r}`);
  const keikaText = (data.keika && data.keika.length) ? data.keika.map(k=>'・'+k).join('\n') : '';
  value(`C${r}`, keikaText, {valign:'top'});
  ws.getRow(r).height = Math.max(22, (data.keika ? data.keika.length : 1) * 16);
  r += 2;

  // --- pixel <-> Excel-unit conversion (Calibri 11 default digit width = 7px) ---
  const COL_PX = Math.floor(((256 * 11 + Math.floor(128/7)) / 256) * 7); // width:11 columns -> ~77px
  const ROW_PX = 18 * (96/72); // default row height 18pt -> ~24px

  // Embeds an image as a twoCellAnchor with editAs:'oneCell' (fixed pixel size, moves with cells
  // but does not stretch). twoCellAnchor is far more broadly supported than a bare tl+ext
  // (oneCellAnchor) drawing. We also pass raw image bytes via `buffer` (a Uint8Array) rather than
  // `base64` — the base64 code path in the browser build of ExcelJS has been unreliable for image
  // media in practice, while a plain byte buffer is handled the same way as it is in Node.
  function addFixedSizeImage(dataUrl, startCol, rowTop, w, h){
    try{
      const ext = dataUrl.includes('image/png') ? 'png' : 'jpeg';
      const bytes = dataUrlToUint8Array(dataUrl);
      const imgId = wb.addImage({ buffer: bytes, extension: ext });
      wb.__expectedImages = (wb.__expectedImages || 0) + 1;
      wb.__expectedImageBytes = (wb.__expectedImageBytes || 0) + bytes.length;
      const colSpan = w / COL_PX;
      const rowSpan = h / ROW_PX;
      ws.addImage(imgId, {
        tl: { col: startCol, row: rowTop - 1 },
        br: { col: startCol + colSpan, row: rowTop - 1 + rowSpan },
        editAs: 'oneCell'
      });
      return Math.ceil(rowSpan) + 1;
    }catch(imgErr){
      console.error('画像の埋め込みに失敗しました', imgErr);
      wb.__imageErrors = (wb.__imageErrors || 0) + 1;
      return Math.ceil((h / ROW_PX)) + 1;
    }
  }

  // Like addImageGridSection, but for a mixed ordered list of text findings and sketch images
  // (作業所見・略図). Text renders as a full-width wrapped row; images are paired two-at-a-time
  // exactly as before whenever they land next to each other in the user's chosen order.
  function addImageGridSection(sectionLabel, items, maxW, maxH){
    ws.mergeCells(`A${r}:J${r}`);
    const sc = ws.getCell(`A${r}`);
    sc.value = sectionLabel;
    sc.font = { bold:true, size:12 };
    sc.fill = labelFill;
    sc.alignment = { vertical:'middle', horizontal:'left' };
    sc.border = border;
    ws.getRow(r).height = 20;
    r++;

    if(!items || !items.length){
      ws.mergeCells(`A${r}:J${r}`);
      value(`A${r}`, '（添付なし）', {align:'center'});
      r += 2;
      return;
    }
    for(let i=0; i<items.length; i+=2){
      const left = items[i];
      const right = items[i+1];
      const rowTop = r;
      let leftRows = 0, rightRows = 0;
      if(left && typeof left.dataUrl === 'string' && left.dataUrl.startsWith('data:image')){
        let w = left.width||800, h = left.height||600;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
        leftRows = addFixedSizeImage(left.dataUrl, 0.1, rowTop, w, h);
      }
      if(right && typeof right.dataUrl === 'string' && right.dataUrl.startsWith('data:image')){
        let w = right.width||800, h = right.height||600;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
        rightRows = addFixedSizeImage(right.dataUrl, 5.1, rowTop, w, h);
      }
      const rowsUsed = Math.max(leftRows, rightRows, 1);
      const capRow = rowTop + rowsUsed;
      if(left){ ws.mergeCells(`A${capRow}:E${capRow}`); value(`A${capRow}`, left.caption||'', {align:'center'}); }
      if(right){ ws.mergeCells(`F${capRow}:J${capRow}`); value(`F${capRow}`, right.caption||'', {align:'center'}); }
      r = capRow + 2;
    }
  }

  // Like addImageGridSection, but walks a mixed ordered list of text findings and sketch
  // images (in whatever order the user arranged them in the editor). Images are paired up
  // two-at-a-time when they appear consecutively; a text finding always starts a fresh
  // full-width row and breaks any pending image pairing.
  function addFindingsSection(sectionLabel, items){
    ws.mergeCells(`A${r}:J${r}`);
    const sc = ws.getCell(`A${r}`);
    sc.value = sectionLabel;
    sc.font = { bold:true, size:12 };
    sc.fill = labelFill;
    sc.alignment = { vertical:'middle', horizontal:'left' };
    sc.border = border;
    ws.getRow(r).height = 20;
    r++;

    if(!items || !items.length){
      ws.mergeCells(`A${r}:J${r}`);
      value(`A${r}`, '（添付なし）', {align:'center'});
      r += 2;
      return;
    }

    const maxW = 245, maxH = 300;
    let pending = null;

    function flushImages(second){
      const rowTop = r;
      const leftRows = pending ? addFixedSizeImage(pending.dataUrl, 0.1, rowTop, pending._w, pending._h) : 0;
      const rightRows = second ? addFixedSizeImage(second.dataUrl, 5.1, rowTop, second._w, second._h) : 0;
      const rowsUsed = Math.max(leftRows, rightRows, 1);
      const capRow = rowTop + rowsUsed;
      if(pending){ ws.mergeCells(`A${capRow}:E${capRow}`); value(`A${capRow}`, pending.caption||'', {align:'center'}); }
      if(second){ ws.mergeCells(`F${capRow}:J${capRow}`); value(`F${capRow}`, second.caption||'', {align:'center'}); }
      r = capRow + 2;
      pending = null;
    }

    items.forEach(it=>{
      if(it.type === 'text'){
        if(pending) flushImages(null);
        const text = (it.text||'').trim();
        if(!text) return;
        ws.mergeCells(`A${r}:J${r}`);
        value(`A${r}`, text, {valign:'top', align:'left'});
        const lineUnits = text.split('\n').reduce((sum,l)=> sum + Math.max(1, Math.ceil(l.length/30)), 0);
        ws.getRow(r).height = Math.max(22, lineUnits*18 + 4);
        r += 2;
      } else if(it && typeof it.dataUrl === 'string' && it.dataUrl.startsWith('data:image')){
        const w = it.width||800, h = it.height||600;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        const enriched = Object.assign({_w:Math.round(w*ratio), _h:Math.round(h*ratio)}, it);
        if(!pending){ pending = enriched; } else { flushImages(enriched); }
      }
    });
    if(pending) flushImages(null);
  }

  // 作業所見・略図 comes first, 作業内容写真 (smaller) comes last — matches the print/PDF layout
  addFindingsSection('作業所見・略図', data.sketches);
  addImageGridSection('作業内容写真', data.photos, 175, 210);

  ws.pageSetup.printArea = `A1:J${Math.max(r, 30)}`;
  return ws;
}

  }
}
